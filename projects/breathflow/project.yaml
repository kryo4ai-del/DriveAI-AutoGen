project:
  name: "BreathFlow"
  slug: "breathflow"
  description: "Minimalist breathing exercise app with animated circle, 3 techniques, weekly stats"
  version: "1.0.0"

lines:
  ios:
    status: active
    language: swift
    framework: swiftui
    architecture: mvvm
    build_tool: xcodegen
    min_target: "iOS 17.0"
  android:
    status: active
    language: kotlin
    framework: jetpack_compose
    architecture: mvvm
    build_tool: gradle
    min_target: "Android API 26"
  web:
    status: active
    language: typescript
    framework: nextjs

pipeline:
  code_extraction: swift
  templates: [feature, screen, viewmodel, service]
  operations_layer: true
  cd_gate: true

metadata:
  created: "2026-03-22"
  status: "development"
