project: "BreathFlow2"
description: "Eine minimalistische Atem-Uebungs-App. Der Nutzer waehlt eine Uebung (4-7-8 Technik, Box Breathing, oder Einfaches Beruhigen), sieht eine animierte Kreis-Animation die sich mit dem Atem ausdehnt und z"
build_mode: layered
target_lines:
  - ios

features:

  - name: "ZielgruppenProfil2545Jahre"
    type: feature
    priority: 1
    description: "Zielgruppen-Profil 25–45 Jahre aus Agent 3, abgeleitet aus Calm/Headspace-Branchen-Proxies; liegt damit bewusst über der Mobile-Gaming-Primärzielgruppe (18–34)."
    depends_on: []

  - name: "WeiblicheMehrheitkonsistent"
    type: feature
    priority: 1
    description: "Weibliche Mehrheit konsistent belegt durch MAF.ad Mobile Demographics 2025 als Proxy für Wellness-Apps."
    depends_on: ["ZielgruppenProfil2545Jahre"]

  - name: "KeinSocialLayeristlautAge"
    type: feature
    priority: 1
    description: "Kein Social-Layer ist laut Agent 3 ein **Feature, kein Mangel** — die Zielgruppe meidet aktiv Daten-Sharing in Wellness-Kontexten. Das stützt die CEO-Idee strukturell."
    depends_on: ["WeiblicheMehrheitkonsistent"]

  - name: "WochentageNutzungdominiertg"
    type: feature
    priority: 1
    description: "Wochentage-Nutzung dominiert gegenüber Wochenenden — Trigger sind berufsbedingte Stressmomente (Agent 3, Session-Verhalten)."
    depends_on: ["KeinSocialLayeristlautAge"]

  - name: "Kostenlos"
    type: feature
    priority: 1
    description: "Kostenlos: 1 Technik vollständig nutzbar (Empfehlung: 'Einfaches Beruhigen' als Einstieg)"
    depends_on: ["WochentageNutzungdominiertg"]

  - name: "OTP299299"
    type: feature
    priority: 1
    description: "OTP ~2,99 € / $2,99: Alle drei Techniken + Wochenstatistik freischalten"
    depends_on: ["Kostenlos"]

  - name: "DieZielgruppereagiertlautA"
    type: feature
    priority: 1
    description: "Die Zielgruppe reagiert laut Agent 3 **negativ auf aggressive Monetarisierung** im Wellness-Kontext — ein einzelner, niedrigschwelliger OTP ist die strukturell passende Lösung."
    depends_on: ["OTP299299"]

  - name: "Agent3ermittelt38Minuten"
    type: feature
    priority: 1
    description: "Agent 3 ermittelt 3–8 Minuten als typische Session-Länge für Wellness-Apps, abgeleitet aus der Übungsdauer selbst (nicht aus Gaming-Proxies)."
    depends_on: ["DieZielgruppereagiertlautA"]

  - name: "12Sessionstäglichentsprich"
    type: feature
    priority: 1
    description: "1–2 Sessions täglich entspricht dem Nutzungsverhalten der Zielgruppe: primär morgens oder abends, reaktiv bei Stressmomenten (Agent 3, Trigger-Momente)."
    depends_on: ["Agent3ermittelt38Minuten"]

  - name: "Empfehlung"
    type: feature
    priority: 1
    description: "Empfehlung:** Keine Push-Notifications in V1 — würde der Positionierung 'keine Ablenkung, kein Tracking' widersprechen und ist für die Zielgruppe laut Agent 3 nicht erwünscht."
    depends_on: ["12Sessionstäglichentsprich"]

  - name: "CompetitiveReportGap3iden"
    type: feature
    priority: 1
    description: "Competitive-Report Gap #3 identifiziert iOS+Android bei modernem UI als praktisch vakante Nische — ein Cross-Platform-Framework maximiert die Marktabdeckung bei minimalem Mehraufwand."
    depends_on: ["Empfehlung"]

  - name: "AnimierterKreisTimerlok"
    type: feature
    priority: 1
    description: "Animierter Kreis + Timer + lokaler Storage sind technisch einfache Anforderungen — kein Argument für nativen Stack erforderlich."
    depends_on: ["CompetitiveReportGap3iden"]

  - name: "DSGVOKonformitätistbeirein"
    type: feature
    priority: 1
    description: "DSGVO-Konformität ist bei reinem Offline-LocalStorage strukturell einfach erreichbar (Trend-Report, Agent 1) — kein rechtlicher Mehraufwand durch Backend-Wegfall."
    depends_on: ["AnimierterKreisTimerlok"]