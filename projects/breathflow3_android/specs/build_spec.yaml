project: "BreathFlow3 Android"
description: "Minimalistische Atem-Uebungs-App — Kotlin/Jetpack Compose"
build_mode: layered
target_lines:
  - android

features:
  - name: "ExerciseSelection"
    type: feature
    priority: 1
    description: "Main screen with 3 exercise cards (4-7-8, Box Breathing, Calm). Jetpack Compose LazyColumn, Material3 Cards, Navigation to BreathingScreen."
    depends_on: []

  - name: "BreathingAnimation"
    type: feature
    priority: 1
    description: "Animated circle using Compose Canvas + animateFloatAsState. Expand on inhale, contract on exhale. CountDownTimer for phases. HapticFeedback on transitions."
    depends_on: ["ExerciseSelection"]

  - name: "SessionComplete"
    type: screen
    priority: 2
    description: "Session done screen: duration, exercise type, encouragement. Save to DataStore."
    depends_on: ["BreathingAnimation"]

  - name: "WeeklyStats"
    type: screen
    priority: 2
    description: "Weekly practice bar chart via Compose Canvas. Minutes per day, total, streak. Data from DataStore."
    depends_on: ["SessionComplete"]

  - name: "Settings"
    type: screen
    priority: 3
    description: "Settings: sound toggle, haptic toggle, dark/light theme. DataStore preferences."
    depends_on: []
