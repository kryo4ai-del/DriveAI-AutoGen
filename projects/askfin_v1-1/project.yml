name: AskFinPremium
options:
  bundleIdPrefix: com.askfin
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.3"
settings:
  SWIFT_VERSION: "5.9"
  CODE_SIGN_IDENTITY: ""
  CODE_SIGNING_REQUIRED: "NO"
  CODE_SIGNING_ALLOWED: "NO"
targets:
  AskFinPremium:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Models
        excludes:
          - "**/*Tests*"
          - "**/TestData.swift"
      - path: Views
      - path: ViewModels
      - path: Services
      - path: Resources
        excludes:
          - "**/Mock*"
    settings:
      INFOPLIST_FILE: App/Info.plist
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      PRODUCT_BUNDLE_IDENTIFIER: com.askfin.premium
  AskFinUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
    dependencies:
      - target: AskFinPremium
    settings:
      SWIFT_VERSION: "5.9"
